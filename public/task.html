<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tasks - ClickCoin</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("BackgroundCC.jpg") no-repeat center center/cover;
  color:white;
  min-height:100vh;
}

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:0;
}

.main-wrapper{
  position:relative;
  z-index:1;
  max-width:420px;
  margin:auto;
  padding:20px;
  padding-bottom:120px;
  text-align:center;
}

.logo{
  width:120px;
  margin:20px auto;
  display:block;
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
  100%{transform:translateY(0)}
}

.glow{
  color:#ffd700;
  margin-bottom:20px;
}

.task-list{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.card{
  background:#1e293b;
  border-radius:15px;
  padding:10px;
  display:flex;
  gap:10px;
}

.card img{
  width:60px;
  border-radius:10px;
}

.card-info{
  text-align:left;
  flex:1;
}

.progress-bar{
  width:100%;
  height:8px;
  background:#333;
  border-radius:10px;
}

.progress-fill{
  height:100%;
  background:#ffd700;
}

.back-btn{
  position:fixed;
  top:15px;
  left:15px;
  background:#ffd700;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  z-index:9999;
}

.loading{
  font-size:14px;
  color:#aaa;
  margin-top:30px;
}
</style>
</head>

<body>

<button class="back-btn" onclick="goBack()">⬅️ Back</button>

<div class="main-wrapper">
  <img src="LOGOClickCoin.png" class="logo">
  <h3 id="wallet" class="glow">Loading...</h3>

  <div id="taskList" class="task-list">
    <p class="loading">Loading tasks...</p>
  </div>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, 
  onAuthStateChanged, 
  setPersistence, 
  browserLocalPersistence 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getDatabase, 
  ref, 
  onValue, 
  get, 
  update 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ========================================
// 🔥 CONFIG
// ========================================
const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "clickcoin-81040.firebaseapp.com",
  databaseURL: "https://clickcoin-81040-default-rtdb.asia-southeast1.firebasedatabase.app",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ========================================
// 🔥 FORCE LOGIN PERSISTENCE (FIX)
// ========================================
await setPersistence(auth, browserLocalPersistence);

// ========================================
// 🔥 FORMAT
// ========================================
function formatPHP(val){
  return "₱" + Number(val || 0).toLocaleString("en-PH");
}

// ========================================
// 🔥 AUTH CHECK (FIXED)
// ========================================
onAuthStateChanged(auth, (user) => {

  console.log("AUTH STATE:", user);

  // 🔥 FIX: delay redirect para hindi false trigger
  if (!user) {
    setTimeout(() => {
      if (!auth.currentUser) {
        location.href = "index.html";
      }
    }, 1500);
    return;
  }

  const uid = user.uid;

  // ========================================
  // 🔥 WALLET REALTIME
  // ========================================
  onValue(ref(db, 'users/' + uid), (snap)=>{
    const data = snap.val() || {};
    document.getElementById("wallet").innerText =
      "BALANCE " + formatPHP(data.wallet || 0);
  });

  // ========================================
  // 🔥 TASK UI
  // ========================================
  onValue(ref(db, 'investments/' + uid), (snap)=>{
    const container = document.getElementById("taskList");
    container.innerHTML = "";

    const tasks = snap.val();
    if (!tasks) {
      container.innerHTML = `<p style="color:#aaa">No active tasks</p>`;
      return;
    }

    Object.keys(tasks).forEach(key => {
      const t = tasks[key];

      const now = Date.now();
      const oneDay = 86400000;

      const last = t.lastClaim || t.createdAt;
      const diff = now - last;

      const daily = t.dailyIncome || (t.price * 0.1);

      const dbEarned = t.totalEarned || 0;

      const liveDays = diff / oneDay;
      const liveEarn = daily * liveDays;

      const totalEarn = dbEarned + liveEarn;

      const max = daily * (t.durationDays || 30);
      const percent = Math.min((totalEarn / max) * 100, 100);

      container.innerHTML += `
        <div class="card">
          <img src="LOGOClickCoin.png">
          <div class="card-info">
            <h3>${t.name || "Investment"}</h3>
            <p>Daily: ${formatPHP(daily)}</p>
            <p>Earned: ${formatPHP(totalEarn)}</p>
            <p>Total: ${formatPHP(max)}</p>
            <p>Progress: ${Math.floor(percent)}%</p>

            <div class="progress-bar">
              <div class="progress-fill" style="width:${percent}%"></div>
            </div>
          </div>
        </div>
      `;
    });
  });

  // ========================================
  // 🔥 AUTO CLAIM
  // ========================================
  setInterval(async () => {

    const snap = await get(ref(db,'investments/'+uid));
    const tasks = snap.val();
    if(!tasks) return;

    let totalClaim = 0;
    const updates = {};

    Object.keys(tasks).forEach(key=>{
      const t = tasks[key];

      const now = Date.now();
      const last = t.lastClaim || t.createdAt;

      const diff = now - last;
      const oneDay = 86400000;

      if(diff < oneDay) return;

      const days = Math.floor(diff / oneDay);
      const daily = t.dailyIncome || (t.price * 0.1);

      const earn = daily * days;

      totalClaim += earn;

      updates['investments/'+uid+'/'+key+'/lastClaim'] = now;
      updates['investments/'+uid+'/'+key+'/totalEarned'] =
        (t.totalEarned || 0) + earn;
    });

    if(totalClaim > 0){

      const userSnap = await get(ref(db,'users/'+uid));
      const userData = userSnap.val() || {};

      updates['users/'+uid+'/wallet'] =
        (userData.wallet || 0) + totalClaim;

      await update(ref(db), updates);
    }

  }, 5000);

});
</script>

<script src="support.js"></script>

</body>
</html>
