<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tasks - ClickCoin</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("BackgroundCC.jpg") no-repeat center center/cover;
  color:white;
  min-height:100vh;
}

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:0;
}

.main-wrapper{
  position:relative;
  z-index:1;
  max-width:420px;
  margin:auto;
  padding:20px;
  padding-bottom:120px;
  text-align:center;
}

.logo{
  width:120px;
  margin:20px auto;
  display:block;
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
  100%{transform:translateY(0)}
}

.glow{
  color:#ffd700;
  margin-bottom:20px;
}

.task-list{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.card{
  background:#1e293b;
  border-radius:15px;
  padding:10px;
  display:flex;
  gap:10px;
}

.card img{
  width:60px;
  border-radius:10px;
}

.card-info{
  text-align:left;
  flex:1;
}

.progress-bar{
  width:100%;
  height:8px;
  background:#333;
  border-radius:10px;
}

.progress-fill{
  height:100%;
  background:#ffd700;
}

.back-btn{
  position:fixed;
  top:15px;
  left:15px;
  background:#ffd700;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  z-index:9999;
}

.bottom-menu{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  margin:auto;
  width:100%;
  max-width:420px;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  border-radius:20px 20px 0 0;
  display:flex;
  justify-content:space-around;
  padding:12px 10px;
  box-shadow:0 -5px 20px rgba(0,0,0,0.6);
  z-index:99999;
}

.menu-item{
  flex:1;
  text-align:center;
  color:#aaa;
  font-size:11px;
  cursor:pointer;
}

.menu-item.active{
  color:#ffd700;
  font-weight:bold;
}
</style>
</head>

<body>

<button class="back-btn" onclick="goBack()">⬅️ Back</button>

<div class="main-wrapper">
  <img src="LOGOClickCoin.png" class="logo">
  <h3 id="wallet" class="glow">BALANCE ₱0</h3>

  <div id="taskList" class="task-list"></div>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMLY-oyKc2rKjOATw5Yplcr_MY1fVH3m4",
  authDomain: "clickcoin-81040.firebaseapp.com",
  databaseURL: "https://clickcoin-81040-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "clickcoin-81040",
  storageBucket: "clickcoin-81040.appspot.com",
  messagingSenderId: "227649837889",
  appId: "1:227649837889:web:81ac51f2e358ed2231dfc0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

function formatPHP(val){
  return "₱" + Number(val || 0).toLocaleString("en-PH");
}

onAuthStateChanged(auth, (user) => {
  if (!user) {
    location.href = "index.html";
    return;
  }

  const uid = user.uid;

  // 🔥 REALTIME USER BALANCE
  onValue(ref(db, 'users/' + uid), (snap)=>{
    const data = snap.val() || {};
    document.getElementById("wallet").innerText =
      "BALANCE " + formatPHP(data.wallet || data.balance || 0);
  });

  // 🔥 REALTIME TASKS (FIXED)
  onValue(ref(db, 'investments/' + uid), (snap)=>{
    const container = document.getElementById("taskList");
    container.innerHTML = "";

    const tasks = snap.val();

    if (!tasks) {
      container.innerHTML = `
        <p style="color:#aaa">
          No active tasks<br><br>
          👉 Go to HOME and BUY a task to start earning
        </p>
      `;
      return;
    }

    Object.keys(tasks).forEach(key => {
      const task = tasks[key];

      const now = Date.now();
      const oneDay = 86400000;

      const days = (now - (task.createdAt || now)) / oneDay;

      const daily = task.dailyIncome || (task.price * 0.1);
      const earned = daily * days;

      const max = daily * (task.durationDays || 30);
      const percent = Math.min((days / (task.durationDays || 30)) * 100, 100);

      container.innerHTML += `
        <div class="card">
          <img src="LOGOClickCoin.png">
          <div class="card-info">
            <h3>${task.name || "Investment"}</h3>
            <p>Daily: ${formatPHP(daily)}</p>
            <p>Earned: ${formatPHP(earned)}</p>
            <p>Total: ${formatPHP(max)}</p>
            <p>Progress: ${Math.floor(percent)}%</p>

            <div class="progress-bar">
              <div class="progress-fill" style="width:${percent}%"></div>
            </div>
          </div>
        </div>
      `;
    });
  });

  // 🔥 AUTO INCOME (SAFE VERSION)
  setInterval(async () => {

    const snap = await new Promise(res=>{
      onValue(ref(db,'investments/'+uid), s=>res(s), {onlyOnce:true});
    });

    const tasks = snap.val();
    if(!tasks) return;

    let total = 0;
    const updates = {};

    Object.keys(tasks).forEach(key=>{
      const t = tasks[key];

      const now = Date.now();
      const last = t.lastClaim || t.createdAt;
      const diff = now - last;

      const oneDay = 86400000;
      if(diff < oneDay) return;

      const days = Math.floor(diff / oneDay);

      const daily = t.dailyIncome || (t.price * 0.1);
      const earn = daily * days;

      total += earn;

      updates['investments/'+uid+'/'+key+'/lastClaim'] = now;
      updates['investments/'+uid+'/'+key+'/totalEarned'] =
        (t.totalEarned || 0) + earn;
    });

    if(total > 0){
      const userSnap = await new Promise(res=>{
        onValue(ref(db,'users/'+uid), s=>res(s), {onlyOnce:true});
      });

      const userData = userSnap.val() || {};

      const newBalance = (userData.wallet || 0) + total;

      updates['users/'+uid+'/wallet'] = Math.floor(newBalance);

      await update(ref(db), updates);
    }

  }, 10000); // every 10 sec check

});

window.goBack = function(){
  location.href="home.html";
};
</script>

<script src="support.js"></script>

</body>
</html>
