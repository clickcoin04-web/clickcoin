<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tasks - ClickCoin</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("BackgroundCC.jpg") no-repeat center center/cover;
  color:white;
  min-height:100vh;
}

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:0;
}

.main-wrapper{
  position:relative;
  z-index:1;
  max-width:420px;
  margin:auto;
  padding:20px;
  padding-bottom:120px;
  text-align:center;
}

.logo{
  width:120px;
  margin:20px auto;
  display:block;
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
  100%{transform:translateY(0)}
}

.glow{
  color:#ffd700;
  margin-bottom:20px;
}

.task-list{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.card{
  background:#1e293b;
  border-radius:15px;
  padding:10px;
  display:flex;
  gap:10px;
  align-items:center;
}

.card img{
  width:70px;
  height:70px;
  object-fit:cover; /* 🔥 FIX IMAGE FIT */
  border-radius:10px;
}

.card-info{
  text-align:left;
  flex:1;
}

.progress-bar{
  width:100%;
  height:8px;
  background:#333;
  border-radius:10px;
}

.progress-fill{
  height:100%;
  background:#ffd700;
}

.back-btn{
  position:fixed;
  top:15px;
  left:15px;
  background:#ffd700;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  z-index:9999;
}

.bottom-menu{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  margin:auto;
  width:100%;
  max-width:420px;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  border-radius:20px 20px 0 0;
  display:flex;
  justify-content:space-around;
  padding:12px 10px;
  box-shadow:0 -5px 20px rgba(0,0,0,0.6);
  z-index:99999;
}

.menu-item{
  flex:1;
  text-align:center;
  color:#aaa;
  font-size:11px;
  cursor:pointer;
}

.menu-item.active{
  color:#ffd700;
  font-weight:bold;
}
</style>
</head>

<body>

<button class="back-btn" onclick="goBack()">⬅️ Back</button>

<div class="main-wrapper">
  <img src="LOGOClickCoin.png" class="logo">
  <h3 id="wallet" class="glow">BALANCE ₱0</h3>

  <div id="taskList" class="task-list"></div>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMLY-oyKc2rKjOATw5Yplcr_MY1fVH3m4",
  authDomain: "clickcoin-81040.firebaseapp.com",
  databaseURL: "https://clickcoin-81040-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "clickcoin-81040",
  storageBucket: "clickcoin-81040.appspot.com",
  messagingSenderId: "227649837889",
  appId: "1:227649837889:web:81ac51f2e358ed2231dfc0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    location.href = "index.html";
    return;
  }

  // ✅ realtime wallet
  onValue(ref(db, 'users/' + user.uid), (snap)=>{
    const data = snap.val() || {};
    document.getElementById("wallet").innerText =
      "BALANCE ₱" + Number(data.wallet || 0).toLocaleString("en-PH");
  });

  // ✅ realtime tasks (NO FAKE)
  onValue(ref(db, 'investments/' + user.uid), (snap)=>{
  const container = document.getElementById("taskList");
  container.innerHTML = "";

  const tasks = snap.val();

  if(!tasks){
    container.innerHTML = `
      <p style="color:#aaa">
        No active tasks<br><br>
        👉 Buy a task to start earning
      </p>
    `;
    return;
  }

  let count = 1;

  Object.keys(tasks).forEach(key=>{
    const task = tasks[key];

    const daily = task.dailyIncome || (task.capital * 0.1);
    const earned = task.totalEarned || 0;
    const max = daily * (task.durationDays || 30);

    const percent = Math.min((earned / max) * 100, 100);

    container.innerHTML += `
      <div class="card">
        <img src="LOGOClickCoin.png">
        <div class="card-info">
          <h3>Task ${count}</h3>

          <p>Task Name: ${task.name || "Click Task"}</p>
          <p>Task Amount: ₱${Number(task.capital).toLocaleString("en-PH")}</p>

          <p>Daily Income: ₱${Number(daily).toLocaleString("en-PH")}</p>
          <p>Earned: ₱${Number(earned).toLocaleString("en-PH")}</p>

          <p>Total Earnings: ₱${Number(max).toLocaleString("en-PH")}</p>

          <div class="progress-bar">
            <div class="progress-fill" style="width:${percent}%"></div>
          </div>
        </div>
      </div>
    `;

    count++;
  });

});

});
</script>

<footer style="text-align:center;padding:20px;">

</footer>

<script>
function goBack(){
  location.href="home.html";
}
</script>

<!-- MENU (UNCHANGED) -->
<div class="bottom-menu">
  <div class="menu-item" onclick="location.href='home.html'">HOME</div>
  <div class="menu-item active">TASK</div>
  <div class="menu-item" onclick="location.href='team.html'">TEAM</div>
  <div class="menu-item" onclick="location.href='account.html'">ACCOUNT</div>
</div>

<script src="support.js"></script>

</body>
</html>
