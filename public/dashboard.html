<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMLY-oyKc2rKjOATw5Yplcr_MY1fVH3m4",
  authDomain: "clickcoin-81040.firebaseapp.com",
  databaseURL: "https://clickcoin-81040-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "clickcoin-81040",
  storageBucket: "clickcoin-81040.firebasestorage.app",
  messagingSenderId: "227649837889",
  appId: "1:227649837889:web:81ac51f2e358ed2231dfc0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

window.db = db;

let authReady = false;

// 🔥 FIXED AUTH FLOW
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  try {
    const snap = await get(ref(db, 'users/' + user.uid));

    if (snap.exists()) {
      const data = snap.val();

      localStorage.setItem("currentUser", JSON.stringify({
        ...data,
        uid: user.uid
      }));
    }

    authReady = true;

    startApp(); // 👉 RUN ONLY AFTER AUTH

  } catch (e) {
    console.error(e);
    alert("Error loading user data");
  }

});
</script>

<script>
// ================================
// 🔥 BASIC SYSTEM (UNCHANGED)
// ================================
function formatPHP(amount) {
  return "₱" + Number(amount).toLocaleString('en-PH');
}

function getUser() {
  return JSON.parse(localStorage.getItem("currentUser"));
}

function updateBalance() {
  const user = getUser();

  if (!user) return; // 🔥 FIX: no redirect habang loading

  document.getElementById("wallet").innerText =
    "BALANCE " + formatPHP(user.wallet || 0);
}

// ================================
// 🔥 START APP (FIXED)
// ================================
function startApp() {
  updateBalance();
  loadTasks();

  setInterval(updateBalance, 1000);
}
</script>

<script>
// ================================
// 🔥 BUY TASK (UNCHANGED LOGIC)
// ================================
async function buyTask(task) {
  let user = getUser();

  if (!user) return;

  if (user.wallet <= 0) {
    window.location.href = "deposit.html";
    return;
  }

  if (user.wallet < task.price) {
    alert("Insufficient balance");
    return;
  }

  user.wallet -= task.price;

  await fetch(`https://clickcoin-81040-default-rtdb.asia-southeast1.firebasedatabase.app/users/${user.uid}.json`, {
    method: "PATCH",
    body: JSON.stringify({ wallet: user.wallet })
  });

  localStorage.setItem("currentUser", JSON.stringify(user));

  let myTasks = JSON.parse(localStorage.getItem("myTasks")) || [];

  myTasks.push({
    name: task.name,
    price: task.price,
    dailyIncome: task.dailyIncome,
    totalRevenue: task.totalRevenue,
    startTime: Date.now(),
    duration: 100 * 24 * 60 * 60 * 1000,
    earned: 0
  });

  localStorage.setItem("myTasks", JSON.stringify(myTasks));

  window.location.href = "task.html";
}
</script>
