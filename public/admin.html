<!-- ================= FULL ADMIN SYSTEM ================= -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - ClickCoin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:url('BackgroundCC.jpg') no-repeat center/cover; }
.main-wrapper { background: rgba(0,0,0,0.9); min-height:100vh; padding:20px; display:flex; justify-content:center; }
.container { max-width:420px; width:100%; }
.logo img { width:120px; display:block; margin:auto; }
.menu { display:flex; flex-wrap:wrap; gap:6px; margin:10px 0; }
.menu button { flex:1 1 30%; padding:10px; border:none; border-radius:10px; background:#222; color:gold; }

.main-box { background:#111; border-radius:12px; padding:12px; height:350px; overflow:auto; }

.card {
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  color:white;
  font-size:12px;
}

.card button {
  margin-top:5px;
  padding:5px;
  border:none;
  border-radius:6px;
}

.approve{background:green;color:white;}
.reject{background:red;color:white;}
.delete{background:#444;color:white;}
.edit{background:gold;color:black;}

.section{display:none;}

.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:#111;
padding:15px;
border-radius:10px;
color:white;
width:90%;
max-width:350px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
background:#222;
color:gold;
border:none;
border-radius:6px;
}

.invite-box{
margin-top:10px;
background:#111;
padding:10px;
border-radius:10px;
}

.copy-btn{
width:100%;
padding:10px;
background:gold;
border:none;
border-radius:10px;
}

.logout-btn{
width:100%;
padding:12px;
background:red;
border:none;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="main-wrapper">
<div class="container">

<div class="logo">
<img src="LOGOClickCoin.png">
</div>

<div class="menu">
<button onclick="show('users')">Users</button>
<button onclick="show('deposit')">Deposits</button>
<button onclick="show('withdraw')">Withdraw</button>
<button onclick="show('stats')">Stats</button>
</div>

<div class="main-box">
<div id="users" class="section"></div>
<div id="deposit" class="section"></div>
<div id="withdraw" class="section"></div>
<div id="stats" class="section">
<canvas id="chart"></canvas>
</div>
</div>

<div class="invite-box">
<input id="inviteCode" readonly>
<input id="inviteLink" readonly>
<button class="copy-btn" onclick="copyInvite()">COPY</button>
</div>

<button class="logout-btn" onclick="logout()">Logout</button>

</div>
</div>

<div id="modal" class="modal">
<div class="modal-box" id="modalContent"></div>
</div>

<!-- SAME HTML & STYLE MO — WALANG BINAGO -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, get, update, remove, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSy...",
databaseURL:"https://clickcoin-81040-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db = getDatabase(app);

// ================= GLOBAL SAFE UPDATE =================
async function safeUpdate(path, data){
try{
await update(ref(db), data);
}catch(e){
console.error("UPDATE ERROR:", e);
alert("Database error");
}
}

// ================= LOGGER =================
async function logAdmin(action, data){
try{
await push(ref(db,"admin_logs"),{
action,
data,
time:Date.now()
});
}catch(e){
console.error("LOG FAIL:",e);
}
}

// ================= USERS =================
let USERS_CACHE = {};

onValue(ref(db,"users"), snap=>{
let html="";
USERS_CACHE = {};

snap.forEach(c=>{
USERS_CACHE[c.key]=c.val();
});

Object.entries(USERS_CACHE).forEach(([id,u])=>{
html+=`
<div class="card">
<b onclick="viewUser('${id}')">${u.username||"N/A"}</b><br>
📱 ${u.phone || "No number"}<br>
💰 ₱${u.wallet||0}<br>
📊 Deposit: ₱${u.totalDeposit||0}

<button class="delete" onclick="deleteUser('${id}')">Delete</button>
<button class="edit" onclick="editBalance('${id}')">Edit</button>
<button class="edit" onclick="addBalance('${id}')">+ Add</button>
<button class="edit" onclick="minusBalance('${id}')">- Deduct</button>
</div>`;
});

document.getElementById("users").innerHTML=html;
computeStats(USERS_CACHE);
});

// ================= DELETE =================
window.deleteUser=async id=>{
if(confirm("Delete user?")){
await remove(ref(db,"users/"+id));
await logAdmin("DELETE_USER",{id});
}
};

// ================= BALANCE =================

// SET
window.editBalance=id=>{
const u=USERS_CACHE[id];

modalContent.innerHTML=`
<h3>Edit Balance</h3>
<input id="newBal" value="${u.wallet||0}">
<button onclick="saveBalance('${id}')">Save</button>
`;
modal.style.display="flex";
};

window.saveBalance=async id=>{
const val=parseFloat(document.getElementById("newBal").value)||0;

await safeUpdate("/",{
['users/'+id+'/wallet']: val
});

await logAdmin("SET_BALANCE",{id,val});
modal.style.display="none";
};

// ADD (SAFE FETCH LATEST)
window.addBalance=id=>{
modalContent.innerHTML=`
<h3>Add Balance</h3>
<input id="amount" placeholder="Amount">
<button onclick="confirmAdd('${id}')">Confirm</button>
`;
modal.style.display="flex";
};

window.confirmAdd=async id=>{
const amt=parseFloat(document.getElementById("amount").value)||0;

const snap = await get(ref(db,"users/"+id));
const u = snap.val() || {};

await safeUpdate("/",{
['users/'+id+'/wallet']: (u.wallet||0)+amt
});

await logAdmin("ADD_BALANCE",{id,amt});
modal.style.display="none";
};

// MINUS
window.minusBalance=id=>{
modalContent.innerHTML=`
<h3>Deduct Balance</h3>
<input id="amount" placeholder="Amount">
<button onclick="confirmMinus('${id}')">Confirm</button>
`;
modal.style.display="flex";
};

window.confirmMinus=async id=>{
const amt=parseFloat(document.getElementById("amount").value)||0;

const snap = await get(ref(db,"users/"+id));
const u = snap.val() || {};

await safeUpdate("/",{
['users/'+id+'/wallet']: (u.wallet||0)-amt
});

await logAdmin("DEDUCT_BALANCE",{id,amt});
modal.style.display="none";
};

// VIEW USER
window.viewUser=id=>{
const u=USERS_CACHE[id];

modalContent.innerHTML=`
<h3>${u.username}</h3>
📱 ${u.phone}<br>
💰 ₱${u.wallet}<br>
📊 ₱${u.totalDeposit||0}<br>
🎯 Ref: ${u.referrer||"none"}<br>
<button onclick="modal.style.display='none'">Close</button>
`;
modal.style.display="flex";
};

// ================= DEPOSITS (FIXED) =================
onValue(ref(db,"transactions"), snap=>{
let html="";

snap.forEach(c=>{
const d=c.val(),id=c.key;

html+=`
<div class="card">
<b>${id}</b><br>
User: ${d.userId}<br>
₱${d.amount}<br>
Status: ${d.status}
<button class="approve" onclick="forceApprove('${id}')">Force Approve</button>
</div>`;
});

document.getElementById("deposit").innerHTML=html;
});

// 🔥 FIX: NO DOUBLE CREDIT
window.forceApprove=async id=>{
const snap=await get(ref(db,"transactions/"+id));
const d=snap.val();

if(!d){
alert("No transaction");
return;
}

// ❌ already processed
if(d.status === "COMPLETED"){
alert("Already approved");
return;
}

const userSnap = await get(ref(db,"users/"+d.userId));
const u = userSnap.val() || {};

await safeUpdate("/",{
['users/'+d.userId+'/wallet']: (u.wallet||0)+d.amount,
['transactions/'+id+'/status']: "COMPLETED",
['transactions/'+id+'/manual']: true
});

await logAdmin("FORCE_DEPOSIT",d);
alert("Deposit approved");
};

// ================= WITHDRAW =================
onValue(ref(db,"withdrawals"), snap=>{
let html="";
let list=[];

snap.forEach(c=>{
const val=c.val();
val.id=c.key;
list.push(val);
});

list.sort((a,b)=>b.time-a.time);

list.forEach(w=>{
const user=USERS_CACHE[w.uid]||{};

html+=`
<div class="card">
${w.username}<br>
📱 ${user.phone}<br>
💰 ₱${w.amount}<br>
${w.status}
<button class="approve" onclick="approveWithdraw('${w.id}')">Approve</button>
<button class="reject" onclick="rejectWithdraw('${w.id}')">Reject</button>
</div>`;
});

document.getElementById("withdraw").innerHTML=html;
});

// 🔥 FIX: optional deduct (if not yet deducted)
window.approveWithdraw=async id=>{
await update(ref(db,"withdrawals/"+id),{status:"APPROVED"});
await logAdmin("APPROVE_WITHDRAW",{id});
};

window.rejectWithdraw=async id=>{
await update(ref(db,"withdrawals/"+id),{status:"REJECTED"});
await logAdmin("REJECT_WITHDRAW",{id});
};

// ================= ADMIN LOGS =================
onValue(ref(db,"admin_logs"), snap=>{
let logs=[];

snap.forEach(c=>{
logs.push(c.val());
});

logs.sort((a,b)=>b.time-a.time);

let html="<h3>Admin Logs</h3>";

logs.slice(0,20).forEach(l=>{
html+=`
<div class="card">
${l.action}<br>
${JSON.stringify(l.data)}<br>
🕒 ${new Date(l.time).toLocaleString()}
</div>`;
});

document.getElementById("stats").innerHTML=html;
});

// ================= STATS =================
let chart;
function computeStats(users){
let count=Object.keys(users).length;

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Users"],
datasets:[{label:"Total Users",data:[count]}]
}
});
}

// ================= UI =================
window.show=id=>{
document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
};

window.logout=()=>{
localStorage.clear();
location="index.html";
};

window.copyInvite=()=>{
navigator.clipboard.writeText(inviteLink.value);
alert("Copied");
};

function generateInvite(){
const code="ADMIN"+Math.floor(Math.random()*9999);
inviteCode.value=code;
inviteLink.value=location.origin+"/register.html?ref="+code;
}

window.onload=()=>{
generateInvite();
show("users");
};
</script>

</body>
</html>
