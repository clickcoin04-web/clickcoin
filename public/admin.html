<!-- ================= FULL ADMIN SYSTEM ================= -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - ClickCoin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* SAME DESIGN */
body { margin:0; font-family:Arial; background:url('BackgroundCC.jpg') no-repeat center/cover; }
.main-wrapper { background: rgba(0,0,0,0.9); min-height:100vh; padding:20px; display:flex; justify-content:center; }
.container { max-width:420px; width:100%; }
.logo img { width:120px; display:block; margin:auto; }
.menu { display:flex; flex-wrap:wrap; gap:6px; margin:10px 0; }
.menu button { flex:1 1 30%; padding:10px; border:none; border-radius:10px; background:#222; color:gold; }

.main-box { background:#111; border-radius:12px; padding:12px; height:350px; overflow:auto; }

.card {
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  color:white;
  font-size:12px;
}

.card button {
  margin-top:5px;
  padding:5px;
  border:none;
  border-radius:6px;
}

.approve{background:green;color:white;}
.reject{background:red;color:white;}
.delete{background:#444;color:white;}
.edit{background:gold;color:black;}

.section{display:none;}

.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:#111;
padding:15px;
border-radius:10px;
color:white;
width:90%;
max-width:350px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
background:#222;
color:gold;
border:none;
border-radius:6px;
}

.invite-box{
margin-top:10px;
background:#111;
padding:10px;
border-radius:10px;
}

.copy-btn{
width:100%;
padding:10px;
background:gold;
border:none;
border-radius:10px;
}

.logout-btn{
width:100%;
padding:12px;
background:red;
border:none;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="main-wrapper">
<div class="container">

<div class="logo">
<img src="LOGOClickCoin.png">
</div>

<div class="menu">
<button onclick="show('users')">Users</button>
<button onclick="show('deposit')">Deposits</button>
<button onclick="show('withdraw')">Withdraw</button>
<button onclick="show('stats')">Stats</button>
</div>

<div class="main-box">
<div id="users" class="section"></div>
<div id="deposit" class="section"></div>
<div id="withdraw" class="section"></div>
<div id="stats" class="section">
<canvas id="chart"></canvas>
</div>
</div>

<div class="invite-box">
<input id="inviteCode" readonly>
<input id="inviteLink" readonly>
<button class="copy-btn" onclick="copyInvite()">COPY</button>
</div>

<button class="logout-btn" onclick="logout()">Logout</button>

</div>
</div>

<div id="modal" class="modal">
<div class="modal-box" id="modalContent"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, get, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSy...",
databaseURL:"https://clickcoin-81040-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db = getDatabase(app);

// ================= USERS =================
let USERS_CACHE = {};

onValue(ref(db,"users"), snap=>{
let html="";
USERS_CACHE = {};

snap.forEach(c=>{
USERS_CACHE[c.key]=c.val();
});

Object.entries(USERS_CACHE).forEach(([id,u])=>{
html+=`
<div class="card">
<b onclick="viewUser('${id}')">${u.username||"N/A"}</b><br>
📱 ${u.phone || "No number"}<br>
💰 ₱${u.wallet||0}<br>
📊 Deposit: ₱${u.totalDeposit||0}
<button class="delete" onclick="deleteUser('${id}')">Delete</button>
<button class="edit" onclick="editBalance('${id}')">Edit Balance</button>
</div>`;
});

document.getElementById("users").innerHTML=html;
computeStats(USERS_CACHE);
});

// DELETE USER
window.deleteUser=id=>{
if(confirm("Delete user?")){
remove(ref(db,"users/"+id));
}
};

// EDIT BALANCE
window.editBalance=async id=>{
const u=USERS_CACHE[id];

modalContent.innerHTML=`
<h3>Edit Balance</h3>
<input id="newBal" value="${u.wallet||0}">
<button onclick="saveBalance('${id}')">Save</button>
`;
modal.style.display="flex";
};

window.saveBalance=async id=>{
const val=parseFloat(document.getElementById("newBal").value);
await update(ref(db,"users/"+id),{wallet:val});
modal.style.display="none";
};

// VIEW USER (WITH FULL PHONE)
window.viewUser=async id=>{
const u=USERS_CACHE[id];

modalContent.innerHTML=`
<h3>${u.username}</h3>
📱 ${u.phone || "No number"}<br>
💰 Wallet: ₱${u.wallet}<br>
📊 Deposit: ₱${u.totalDeposit||0}<br>
<button onclick="modal.style.display='none'">Close</button>
`;
modal.style.display="flex";
};

// ================= DEPOSIT =================
onValue(ref(db,"deposits"), snap=>{
let html="";

snap.forEach(c=>{
const d=c.val(),id=c.key;

html+=`
<div class="card">
${d.username}<br>
₱${d.amount}<br>
${d.status}
<button class="approve" onclick="approveDeposit('${id}')">Approve</button>
<button class="reject" onclick="rejectDeposit('${id}')">Reject</button>
</div>`;
});

document.getElementById("deposit").innerHTML=html;
});

window.approveDeposit=async id=>{
const snap=await get(ref(db,"deposits/"+id));
const d=snap.val();

const u=USERS_CACHE[d.uid];

await update(ref(db,"users/"+d.uid),{
wallet:(u.wallet||0)+d.amount,
totalDeposit:(u.totalDeposit||0)+d.amount
});

await update(ref(db,"deposits/"+id),{status:"APPROVED"});
};

window.rejectDeposit=id=>{
update(ref(db,"deposits/"+id),{status:"REJECTED"});
};

// ================= WITHDRAW (FULL DETAILS) =================
onValue(ref(db,"withdrawals"), snap=>{
let html="";
let list=[];

snap.forEach(c=>{
list.push(c.val());
});

// sort newest
list.sort((a,b)=>b.time-a.time);

list.forEach(w=>{
const user = USERS_CACHE[w.uid] || {};

html+=`
<div class="card">
<b>${w.username}</b><br>
📱 ${user.phone || "No number"}<br>
💳 ${w.method}<br>
👤 ${w.accName}<br>
📲 ${w.accNumber}<br>
💰 Amount: ₱${w.amount}<br>
💸 Fee: ₱${w.fee}<br>
✅ Receive: ₱${w.receive}<br>
🕒 ${new Date(w.time).toLocaleString()}<br>
<b>Status: ${w.status}</b><br>

<button class="approve" onclick="approveWithdraw('${w.id}')">Approve</button>
<button class="reject" onclick="rejectWithdraw('${w.id}')">Reject</button>
</div>`;
});

document.getElementById("withdraw").innerHTML=html;
});

window.approveWithdraw=id=>{
update(ref(db,"withdrawals/"+id),{status:"APPROVED"});
};

window.rejectWithdraw=id=>{
update(ref(db,"withdrawals/"+id),{status:"REJECTED"});
};

// ================= STATS =================
let chart;

function computeStats(users){
let count=Object.keys(users).length;

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Users"],
datasets:[{label:"Total Users",data:[count]}]
}
});
}

// ================= UI =================
window.show=id=>{
document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
};

window.logout=()=>{
localStorage.clear();
location="index.html";
};

window.copyInvite=()=>{
navigator.clipboard.writeText(inviteLink.value);
alert("Copied");
};

function generateInvite(){
const code="ADMIN"+Math.floor(Math.random()*9999);
inviteCode.value=code;
inviteLink.value=location.origin+"/register.html?ref="+code;
}

window.onload=()=>{
generateInvite();
show("users");
};
</script>

</body>
</html>
