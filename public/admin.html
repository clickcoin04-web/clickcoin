<!-- ================= FULL ADMIN SYSTEM ================= -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - ClickCoin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:url('BackgroundCC.jpg') no-repeat center/cover; }
.main-wrapper { background: rgba(0,0,0,0.9); min-height:100vh; padding:20px; display:flex; justify-content:center; }
.container { max-width:420px; width:100%; }
.logo img { width:120px; display:block; margin:auto; }
.menu { display:flex; flex-wrap:wrap; gap:6px; margin:10px 0; }
.menu button { flex:1 1 30%; padding:10px; border:none; border-radius:10px; background:#222; color:gold; }

.main-box { background:#111; border-radius:12px; padding:12px; height:350px; overflow:auto; }

.card {
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  color:white;
  font-size:12px;
}

.card button {
  margin-top:5px;
  padding:5px;
  border:none;
  border-radius:6px;
}

.approve{background:green;color:white;}
.reject{background:red;color:white;}
.delete{background:#444;color:white;}
.edit{background:gold;color:black;}

.section{display:none;}

.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:#111;
padding:15px;
border-radius:10px;
color:white;
width:90%;
max-width:350px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
background:#222;
color:gold;
border:none;
border-radius:6px;
}

.invite-box{
margin-top:10px;
background:#111;
padding:10px;
border-radius:10px;
}

.copy-btn{
width:100%;
padding:10px;
background:gold;
border:none;
border-radius:10px;
}

.logout-btn{
width:100%;
padding:12px;
background:red;
border:none;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="main-wrapper">
<div class="container">

<div class="logo">
<img src="LOGOClickCoin.png">
</div>

<div class="menu">
<button onclick="show('users')">Users</button>
<button onclick="show('deposit')">Deposits</button>
<button onclick="show('withdraw')">Withdraw</button>
<button onclick="show('stats')">Stats</button>
</div>

<div class="main-box">
<div id="users" class="section"></div>
<div id="deposit" class="section"></div>
<div id="withdraw" class="section"></div>
<div id="stats" class="section">
<canvas id="chart"></canvas>
</div>
</div>

<div class="invite-box">
<input id="inviteCode" readonly>
<input id="inviteLink" readonly>
<button class="copy-btn" onclick="copyInvite()">COPY</button>
</div>

<button class="logout-btn" onclick="logout()">Logout</button>

</div>
</div>

<div id="modal" class="modal">
<div class="modal-box" id="modalContent"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, get, update, remove, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSy...",
databaseURL:"https://clickcoin-81040-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db = getDatabase(app);

// SAFE UPDATE
async function safeUpdate(path, data){
try{
await update(ref(db), data);
}catch(e){
console.error(e);
alert("Database error");
}
}

// LOG
async function logAdmin(action,data){
await push(ref(db,"admin_logs"),{
action,data,time:Date.now()
});
}

// ================= USERS REALTIME =================
let USERS_CACHE = {};

onValue(ref(db, "users"), snap => {
  let html = "";
  USERS_CACHE = {};

  snap.forEach(c => {
    USERS_CACHE[c.key] = c.val();
  });

  Object.entries(USERS_CACHE).forEach(([id, u]) => {

    html += `
    <div class="card">

      <b onclick="viewUser('${id}')">
        ${u.username || "N/A"}
      </b><br>

      🆔 UID: ${id}<br>

      📱 FULL NUMBER: ${u.phone || u.mobile || "NO NUMBER"}<br>

      💳 WITHDRAW NUMBER: ${u.withdrawNumber ? u.withdrawNumber : "NOT SET"}<br>

      💰 Wallet: ₱${Number(u.wallet || 0).toLocaleString("en-PH")}<br>

      💵 Earnings: ₱${Number(u.totalEarnings || 0).toLocaleString("en-PH")}<br>

      🔒 Deposit Locked: ₱${Number(u.depositBalance || 0).toLocaleString("en-PH")}<br>

      <br>

      <button class="delete" onclick="deleteUser('${id}')">Delete</button>

      <button class="edit" onclick="editBalance('${id}')">Edit</button>

      <button class="edit" onclick="addBalance('${id}')">+ Add</button>

      <button class="edit" onclick="minusBalance('${id}')">- Deduct</button>

    </div>
    `;
  });

  users.innerHTML = html;

  // 🔥 stats (wallet total, etc.)
  computeStats(USERS_CACHE);
});

// DELETE
window.deleteUser=async id=>{
if(confirm("Delete user?")){
await remove(ref(db,"users/"+id));
await logAdmin("DELETE_USER",{id});
}
};

// VIEW USER
window.viewUser=id=>{
const u=USERS_CACHE[id];
modalContent.innerHTML=`
<h3>${u.username}</h3>
📱 ${u.phone}<br>
💰 ₱${u.wallet}<br>
💵 ₱${u.earningsBalance||0}<br>
🔒 ₱${u.depositBalance||0}<br>
<button onclick="modal.style.display='none'">Close</button>
`;
modal.style.display="flex";
};

// BALANCE EDIT
window.editBalance=id=>{
const u=USERS_CACHE[id];
modalContent.innerHTML=`
<h3>Edit Wallet</h3>
<input id="newBal" value="${u.wallet||0}">
<button onclick="saveBalance('${id}')">Save</button>
`;
modal.style.display="flex";
};

window.saveBalance=async id=>{
const val=parseFloat(newBal.value)||0;
await safeUpdate("/",{
['users/'+id+'/wallet']:val
});
modal.style.display="none";
};

// ADD
window.addBalance=id=>{
modalContent.innerHTML=`
<h3>Add Earnings</h3>
<input id="amount">
<button onclick="confirmAdd('${id}')">Confirm</button>
`;
modal.style.display="flex";
};

window.confirmAdd=async id=>{
const amt=parseFloat(amount.value)||0;
const snap=await get(ref(db,"users/"+id));
const u=snap.val()||{};
await safeUpdate("/",{
['users/'+id+'/wallet']:(u.wallet||0)+amt,
['users/'+id+'/earningsBalance']:(u.earningsBalance||0)+amt
});
modal.style.display="none";
};

// MINUS
window.minusBalance=id=>{
modalContent.innerHTML=`
<h3>Deduct Earnings</h3>
<input id="amount">
<button onclick="confirmMinus('${id}')">Confirm</button>
`;
modal.style.display="flex";
};

window.confirmMinus=async id=>{
const amt=parseFloat(amount.value)||0;
const snap=await get(ref(db,"users/"+id));
const u=snap.val()||{};
await safeUpdate("/",{
['users/'+id+'/wallet']:(u.wallet||0)-amt,
['users/'+id+'/earningsBalance']:(u.earningsBalance||0)-amt
});
modal.style.display="none";
};

// DEPOSITS
onValue(ref(db,"transactions"), snap=>{
let html="";
snap.forEach(c=>{
const d=c.val(),id=c.key;
html+=`
<div class="card">
${id}<br>
User: ${d.userId}<br>
₱${d.amount}<br>
${d.status}
<button class="approve" onclick="forceApprove('${id}')">Approve</button>
</div>`;
});
deposit.innerHTML=html;
});

// APPROVE DEPOSIT
window.forceApprove=async id=>{
const snap=await get(ref(db,"transactions/"+id));
const d=snap.val();

if(!d) return;
if(d.status==="COMPLETED"){alert("Already");return;}

const userSnap=await get(ref(db,"users/"+d.userId));
const u=userSnap.val()||{};

await safeUpdate("/",{
['users/'+d.userId+'/depositBalance']:(u.depositBalance||0)+d.amount,
['users/'+d.userId+'/wallet']:(u.wallet||0)+d.amount,
['transactions/'+id+'/status']:"COMPLETED"
});
};

// ================= WITHDRAW (FINAL FIX) =================
onValue(ref(db,"withdrawals"), async snap=>{
let html="";
let list=[];

snap.forEach(c=>{
const val=c.val();
val.id=c.key;
list.push(val);
});

list.sort((a,b)=>b.time-a.time);

for(const w of list){

let phone = w.phone || "";

// 🔥 ADD: kunin muna withdrawNumber (user input)
if(w.withdrawNumber){
phone = w.withdrawNumber;
}

// 🔥 fallback pa rin (existing logic mo)
if(!phone){
try{
const userSnap = await get(ref(db,"users/"+w.uid));
const u = userSnap.val()||{};
phone = u.phone || "NO NUMBER";
}catch(e){
phone="ERROR";
}
}

html+=`
<div class="card">
<b>${w.username}</b><br>

📱 FULL NUMBER: ${phone}<br>

💰 Amount: ₱${w.amount}<br>
💸 Fee (10%): ₱${(w.amount * 0.10).toFixed(2)}<br>
✅ Total Deduct: ₱${(w.amount * 1.10).toFixed(2)}<br>
Status: ${w.status}

<button class="approve" onclick="approveWithdraw('${w.id}')">Approve</button>
<button class="reject" onclick="rejectWithdraw('${w.id}')">Reject</button>
</div>`;
}

withdraw.innerHTML=html;
});

// APPROVE WITHDRAW
window.approveWithdraw=async id=>{
const snap=await get(ref(db,"withdrawals/"+id));
const w=snap.val();

if(!w) return;

if(w.status==="APPROVED"){
alert("Already processed");
return;
const fee = w.amount * 0.10;
const total = w.amount + fee;
}

const userSnap=await get(ref(db,"users/"+w.uid));
const u=userSnap.val()||{};

if((u.earningsBalance||0) < total){
alert("Not enough earnings");
return;
}

const fee = w.amount * 0.10;
const total = w.amount + fee;

await safeUpdate("/",{
['users/'+w.uid+'/earningsBalance']:(u.earningsBalance||0)-total,
['users/'+w.uid+'/wallet']:(u.wallet||0)-total,
['withdrawals/'+id+'/status']:"APPROVED",
['withdrawals/'+id+'/fee']:fee,
['withdrawals/'+id+'/totalDeduct']:total
});

alert("SEND MONEY TO: "+(w.withdrawNumber||w.phone||u.phone||"NO NUMBER"));
};

// REJECT
window.rejectWithdraw=async id=>{
await update(ref(db,"withdrawals/"+id),{status:"REJECTED"});
};

// STATS
let chart;
function computeStats(users){
let count=Object.keys(users).length;
if(chart) chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{labels:["Users"],datasets:[{label:"Total Users",data:[count]}]}
});
}

// UI
window.show=id=>{
document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
};

window.logout=()=>{
localStorage.clear();
location="index.html";
};

window.copyInvite=()=>{
navigator.clipboard.writeText(inviteLink.value);
alert("Copied");
};

function generateInvite(){
const code="ADMIN"+Math.floor(Math.random()*9999);
inviteCode.value=code;
inviteLink.value=location.origin+"/register.html?ref="+code;
}

window.onload=()=>{
generateInvite();
show("users");
};
</script>

</body>
</html>
