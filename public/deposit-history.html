<!DOCTYPE html>
<html>
<head>
  <title>Deposit History</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      display: flex;
      justify-content: center;
      background: #0f172a;
      color: white;
      font-family: Arial;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 15px;
      padding-bottom: 100px;
    }

    .back-btn {
      margin: 10px 0;
      padding: 8px 12px;
      background: gold;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .title {
      margin-bottom: 15px;
    }

    .card {
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .amount {
      color: gold;
      font-size: 16px;
      font-weight: bold;
    }

    .date {
      font-size: 12px;
      color: #aaa;
    }

    .empty {
      text-align: center;
      margin-top: 40px;
      color: #aaa;
    }
  </style>
</head>

<body onload="loadDepositHistory()">

<div class="container">

  <button onclick="goBack()" class="back-btn">← Back</button>
  <h2 class="title">Deposit History</h2>

  <div id="historyList"></div>

</div>

<script>
function goBack() {
  window.location.href = "account.html";
}

// ✅ ₱15.41 FORMAT
function formatPHP(amount) {
  return "₱" + Number(amount).toLocaleString('en-PH', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function loadDepositHistory() {
  let logs = JSON.parse(localStorage.getItem("logs")) || [];
  let container = document.getElementById("historyList");

  container.innerHTML = "";

  // ✅ FIX: accept both "deposit" and "DEPOSIT"
  let deposits = logs.filter(log =>
    log.type === "deposit" || log.type === "DEPOSIT"
  );

  if (deposits.length === 0) {
    container.innerHTML = `
      <div class="empty">
        No deposit history yet
      </div>
    `;
    return;
  }

  // latest first
  deposits.reverse();

  deposits.forEach(log => {
    let div = document.createElement("div");
    div.className = "card";

    // ✅ handle both formatted and raw numbers
    let amount = isNaN(log.details) ? log.details : formatPHP(log.details);

    div.innerHTML = `
      <div class="amount">${amount}</div>
      <div class="date">${log.date}</div>
    `;

    container.appendChild(div);
  });
}
</script>

</body>
</html>
