<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account - ClickCoin</title>

<link rel="stylesheet" href="style.css"> <!-- ✅ gamitin na global -->

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:url('BackgroundCC.jpg') no-repeat center/cover;
color:#fff;
}

.main-wrapper{
max-width:420px;
margin:auto;
padding:20px;
padding-bottom:120px;
}

.logo{
width:120px;
display:block;
margin:10px auto;
animation:float 3s ease-in-out infinite;
}

/* ✅ FIXED LOGOUT BUTTON */
.logout-btn{
display:flex;
justify-content:center;
align-items:center;

width:90%;
max-width:320px;
margin:15px auto;

padding:9px;

background:rgba(255,0,0,0.15);
border:1px solid rgba(255,0,0,0.4);
border-radius:15px;

color:#ff4d4d;
font-weight:bold;
font-size:16px;

text-align:center;

box-shadow:0 0 10px rgba(255,0,0,0.2);
animation:pulseGlow 2s infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0);}
}

.glow{text-align:center;color:gold;margin:20px 0 10px;}

.card{
background:rgba(0,0,0,0.6);
border-radius:15px;
padding:18px;
box-shadow:0 0 12px rgba(255,215,0,0.15);
margin-bottom:15px;
backdrop-filter:blur(6px);
}

.card-info{display:flex;flex-direction:column;gap:6px;}

.account-card{text-align:center;padding:25px 15px;}

.user-phone{opacity:0.8;margin-bottom:5px;}

.balance-label{font-size:12px;opacity:0.6;}

.balance-amount{font-size:26px;margin-top:5px;}

.task-list{display:flex;flex-direction:column;gap:15px;}

.menu-card{cursor:pointer;transition:0.2s;}

.menu-card:active{transform:scale(0.96);}

@keyframes pulseGlow{
0%{box-shadow:0 0 5px rgba(255,0,0,0.3);}
50%{box-shadow:0 0 15px rgba(255,0,0,0.7);}
100%{box-shadow:0 0 5px rgba(255,0,0,0.3);}
}

.invite-box{
background:linear-gradient(135deg,#0f172a,#1e293b);
border:1px solid rgba(255,215,0,0.3);
border-radius:12px;
padding:10px;
box-shadow:0 0 12px rgba(255,215,0,0.2);
max-width:100%;
overflow:hidden;
}

.input-field{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:6px;
background:#000;
color:#ffd700;
font-weight:bold;
text-align:center;
}

.buy-btn{
margin-top:12px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ffd700,#ffae00);
color:#000;
font-weight:bold;
cursor:pointer;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* ❌ TINANGGAL NA ANG .bottom-menu STYLE */
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>

<body>

<div class="main-wrapper">

<img src="LOGOClickCoin.png" class="logo">
<h3 class="glow">MY ACCOUNT</h3>

<div class="card account-card">
<p class="user-phone" id="mobile">+63-00000000</p>
<p class="balance-label">BALANCE</p>
<h2 class="glow balance-amount" id="wallet">₱0.00</h2>
</div>

<div class="task-list account-menu">
<div class="card menu-card" onclick="goPage('deposit.html')"><div class="card-info">💰 Deposit</div></div>
<div class="card menu-card" onclick="goPage('withdraw.html')"><div class="card-info">🏧 Withdraw</div></div>
<div class="card menu-card" onclick="goPage('withdraw-history.html')"><div class="card-info">📤 Withdrawal History</div></div>
<div class="card menu-card" onclick="goPage('transaction-history.html')"><div class="card-info">📜 Transaction History</div></div>
<div class="card menu-card" onclick="goPage('logs.html')"><div class="card-info">🧾 Activity Logs</div></div>
<div class="card menu-card" onclick="goPage('team.html')"><div class="card-info">👥 My Team</div></div>

<div class="card menu-card logout-btn" onclick="logout()">
<div class="card-info">🚪 Logout</div>
</div>
</div>

<h3 class="glow">INVITATION</h3>

<div class="task-list">
<div class="invite-box">
<p>🔗 Invite Link</p>
<input id="inviteLink" class="input-field" readonly onclick="openLink()">
<button class="buy-btn" onclick="copyLink()">Copy Link</button>
</div>

<div class="invite-box">
<p>🎟 Invite Code</p>
<input id="inviteCode" class="input-field" readonly onclick="copyCode()">
<button class="buy-btn" onclick="copyCode()">Copy Code</button>
</div>
</div>

</div>

<!-- ✅ MENU (galing na sa style.css ang design) -->
<div class="bottom-menu">
<div class="menu-item" onclick="location.href='home.html'">HOME</div>
<div class="menu-item" onclick="location.href='task.html'">TASK</div>
<div class="menu-item" onclick="location.href='team.html'">TEAM</div>
<div class="menu-item active">ACCOUNT</div>
</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyCMLY-oyKc2rKjOATw5Yplcr_MY1fVH3m4",
authDomain: "clickcoin-81040.firebaseapp.com",
databaseURL: "https://clickcoin-81040-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "clickcoin-81040",
storageBucket: "clickcoin-81040.firebasestorage.app",
messagingSenderId: "227649837889",
appId: "1:227649837889:web:81ac51f2e358ed2231dfc0"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

function formatPHP(a){
return "₱"+Number(a || 0).toLocaleString('en-PH',{minimumFractionDigits:2});
}

auth.onAuthStateChanged(user => {

if(!user){
window.location.href="index.html";
return;
}

const uid = user.uid;

// 🔥 REALTIME USER LISTENER (FIXED)
db.ref("users/"+uid).on("value", snap=>{
const data = snap.val();

if(!data) return;

// ✅ BALANCE FIX (important)
const balance = data.wallet || data.balance || 0;

document.getElementById("wallet").innerText = formatPHP(balance);

// ✅ MOBILE
let mobile = data.mobile || "";
if(mobile && !mobile.startsWith("+63")){
mobile = "+"+mobile.replace(/^0/,"");
}
document.getElementById("mobile").innerText = mobile;

// ✅ SAVE CACHE (optional)
localStorage.setItem("currentUser", JSON.stringify({
uid: uid,
mobile: mobile,
wallet: balance
}));

});

// 🔥 GENERATE INVITE (NO DUPLICATE)
generateInvite(uid);

});

// 🔥 INVITE SYSTEM (FIXED)
function generateInvite(uid){

db.ref("users/"+uid).once("value").then(snap=>{
const data = snap.val() || {};

let code = data.myInviteCode;

if(!code){
code = "CC"+uid.substring(0,6).toUpperCase();

db.ref("users/"+uid).update({
myInviteCode: code
});

db.ref("invites/"+code).set({
uid: uid,
createdAt: Date.now()
});
}

// ✅ SET UI
const link = window.location.origin + "/register.html?ref=" + code;

document.getElementById("inviteCode").value = code;
document.getElementById("inviteLink").value = link;

});
}

function goPage(p){
window.location.href = p;
}

function logout(){
auth.signOut().then(()=>{
localStorage.removeItem("currentUser");
window.location.href="index.html";
});
}

function copyLink(){
const el = document.getElementById("inviteLink");
el.select();
document.execCommand("copy");
alert("Copied!");
}

function copyCode(){
const el = document.getElementById("inviteCode");
el.select();
document.execCommand("copy");
alert("Copied!");
}

function openLink(){
window.open(document.getElementById("inviteLink").value,"_blank");
}
</script>

</body>
</html>
